<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="320" height="100" rx="14" fill="url(#bgGrad)"/>
  <!-- GPX track line -->
  <polyline points="10,72 30,55 50,65 70,40 90,50 110,30 130,45 150,35 170,50 190,38 210,55 230,42 250,60 270,48 290,58 310,45" fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <!-- Cyclist icon (simplified) -->
  <!-- Head -->
  <circle cx="54" cy="22" r="6" fill="#e94560"/>
  <!-- Body -->
  <line x1="54" y1="28" x2="48" y2="46" stroke="#f0f0f0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms to handlebar -->
  <line x1="51" y1="36" x2="38" y2="30" stroke="#f0f0f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="35" y1="28" x2="41" y2="28" stroke="#f0f0f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Front fork -->
  <line x1="38" y1="30" x2="34" y2="48" stroke="#f0f0f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Rear frame -->
  <line x1="48" y1="46" x2="60" y2="46" stroke="#f0f0f0" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="46" x2="54" y2="28" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="34" cy="50" r="8" fill="none" stroke="#f5a623" stroke-width="2"/>
  <circle cx="60" cy="50" r="8" fill="none" stroke="#f5a623" stroke-width="2"/>
  <!-- Pedal -->
  <circle cx="48" cy="46" r="2.5" fill="#e94560"/>
  <!-- Title text -->
  <text x="82" y="42" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" letter-spacing="1">GPX Editor</text>
  <!-- Subtitle -->
  <text x="84" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f5a623" letter-spacing="2">POWER &amp; SPEED</text>
  <!-- Bottom bar accent -->
  <rect x="82" y="68" width="170" height="2" rx="1" fill="url(#lineGrad)" opacity="0.7"/>
</svg>
