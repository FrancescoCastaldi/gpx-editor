<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycleEdit Pro - Power & Speed Editor</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    
    <!-- Librerie Esterne -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
    </div>
    <div class="container">
        <div class="header">
            <div class="logo">CYCLE EDIT PRO</div>
            <div class="file-info" id="fileInfo"></div>
        </div>
        <div id="dropZone" class="drop-zone">
            <h2>Trascina il tuo file .fit o .gpx</h2>
            <p>Supporta Garmin, Strava e Wahoo (Max 15MB)</p>
            <input type="file" id="fileInput" hidden accept=".gpx,.fit">
        </div>
        <div id="editorLayout" class="editor-layout">
            <div class="main-panel">
                <div id="map"></div>
                <div class="chart-container">
                    <canvas id="activityChart"></canvas>
                </div>
            </div>
            <div class="side-panel">
                <div class="control-card">
                    <h3>Regolazione Watt</h3>
                    <div class="input-group">
                        <label>Incremento %</label>
                        <input type="number" id="powerPct" value="0" step="1">
                    </div>
                    <div class="input-group">
                        <label>Aggiunta fissa (W)</label>
                        <input type="number" id="powerAdd" value="0">
                    </div>
                    <button class="btn btn-primary" onclick="applyPowerChanges()">Applica Potenza</button>
                </div>
                <div class="control-card">
                    <h3>Regolazione Velocità</h3>
                    <div class="input-group">
                        <label>Moltiplicatore (es. 1.05)</label>
                        <input type="number" id="speedMult" value="1.0" step="0.01">
                    </div>
                    <button class="btn btn-primary" onclick="applySpeedChanges()">Applica Velocità</button>
                </div>
                <button class="btn btn-success" id="exportBtn">Esporta FIT/GPX</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
