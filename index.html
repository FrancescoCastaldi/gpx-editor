<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CycleEdit Pro - Power & Speed Editor</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">

    <!-- Librerie Esterne -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .logo { font-size: 1.5rem; font-weight: 900; background: linear-gradient(45deg, var(--primary), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .drop-zone { border: 2px dashed #334155; border-radius: 1.5rem; padding: 4rem 2rem; text-align: center; transition: all 0.3s; background: var(--card-bg); cursor: pointer; position: relative; }
        .drop-zone.active { border-color: var(--primary); background: #1e293b; transform: scale(1.01); }
        .drop-zone h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--text-main); }
        .drop-zone p { color: var(--text-dim); font-size: 0.875rem; }
        .editor-layout { display: none; grid-template-columns: 1fr 320px; gap: 2rem; margin-top: 2rem; }
        .main-panel { background: var(--card-bg); border-radius: 1.5rem; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .side-panel { display: flex; flex-direction: column; gap: 1.5rem; }
        .chart-container { height: 450px; position: relative; }
        .control-card { background: var(--card-bg); border-radius: 1.25rem; padding: 1.5rem; border: 1px solid #334155; }
        .control-card h3 { font-size: 0.875rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem; letter-spacing: 0.05em; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.813rem; color: var(--text-dim); margin-bottom: 0.5rem; }
        .input-group input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 0.75rem; padding: 0.75rem 1rem; color: white; font-size: 0.938rem; transition: border-color 0.2s; }
        .input-group input:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: 1rem; border-radius: 0.875rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-size: 0.938rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-success { background: var(--accent-green); color: white; margin-top: auto; }
        .btn-success:hover { background: #059669; transform: translateY(-1px); }
        #loadingOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; place-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .file-info { display: flex; align-items: center; gap: 1rem; color: var(--text-dim); font-size: 0.875rem; }
    </style>
</head>
<body>
    <div id="loadingOverlay"><div class="spinner"></div></div>
    <div class="container">
        <div class="header">
            <div class="logo">CYCLE EDIT PRO</div>
            <div class="file-info" id="fileInfo"></div>
        </div>
        <div id="dropZone" class="drop-zone">
            <h2>Trascina il tuo file .fit o .gpx</h2>
            <p>Supporta Garmin, Strava e Wahoo (Max 15MB)</p>
            <input type="file" id="fileInput" hidden accept=".gpx,.fit">
        </div>
        <div id="editorLayout" class="editor-layout">
            <div class="main-panel">
                <div class="chart-container">
                    <canvas id="activityChart"></canvas>
                </div>
            </div>
            <div class="side-panel">
                <div class="control-card">
                    <h3>Regolazione Watt</h3>
                    <div class="input-group">
                        <label>Incremento %</label>
                        <input type="number" id="powerPct" value="0" step="1">
                    </div>
                    <div class="input-group">
                        <label>Aggiunta fissa (W)</label>
                        <input type="number" id="powerAdd" value="0">
                    </div>
                    <button class="btn btn-primary" onclick="applyPowerChanges()">Applica Potenza</button>
                </div>
                <div class="control-card">
                    <h3>Regolazione Velocit&#224;</h3>
                    <div class="input-group">
                        <label>Moltiplicatore (es. 1.05)</label>
                        <input type="number" id="speedMult" value="1.0" step="0.01">
                    </div>
                    <button class="btn btn-primary" onclick="applySpeedChanges()">Applica Velocit&#224;</button>
                </div>
                <button class="btn btn-success" id="exportBtn">Esporta FIT/GPX</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
