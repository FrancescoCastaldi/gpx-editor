<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Editor - Power & Speed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --card: #f5f5f5; --primary: #2563eb; --border: #e5e7eb; }
        [data-theme="dark"] { --bg: #111827; --text: #f9fafb; --card: #1f2937; --primary: #3b82f6; --border: #374151; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .drop-zone { border: 2px dashed var(--primary); padding: 40px; text-align: center; cursor: pointer; border-radius: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .stat-card { background: var(--bg); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 1.5rem; font-weight: bold; display: block; }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        input, select, button { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #chartContainer { height: 400px; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>GPX Editor</h1>
        <button onclick="toggleTheme()" id="themeToggle">🌙 Mode</button>
    </div>

    <div class="container">
        <div id="uploadArea" class="drop-zone" ondrop="handleDrop(event)" ondragover="event.preventDefault()" onclick="document.getElementById('fileInput').click()">
            <p>Trascina il file .gpx qui oppure clicca per scegliere</p>
            <input type="file" id="fileInput" class="hidden" accept=".gpx" onchange="handleFile(this.files[0])">
        </div>

        <div id="dashboard" class="card hidden">
            <div class="stats-grid">
                <div class="stat-card"><span>Potenza Media</span><span class="stat-val" id="avgPower">-</span><span>W</span></div>
                <div class="stat-card"><span>Velocità Media</span><span class="stat-val" id="avgSpeed">-</span><span>km/h</span></div>
                <div class="stat-card"><span>Distanza</span><span class="stat-val" id="distance">-</span><span>km</span></div>
                <div class="stat-card"><span>Durata</span><span class="stat-val" id="duration">-</span></div>
                <div class="stat-card"><span>Trackpoints</span><span class="stat-val" id="points">-</span></div>
                <div class="stat-card"><span>Dislivello +</span><span class="stat-val" id="elevation">-</span><span>m</span></div>
            </div>
        </div>

        <div id="visuals" class="card hidden">
            <div id="chartContainer"><canvas id="profileChart"></canvas></div>
        </div>

        <div id="editor" class="card hidden">
            <h3>Modifica Attività</h3>
            <div class="controls">
                <div>
                    <label>Modalità</label><br>
                    <select id="editMode" onchange="updatePreview()">
                        <option value="both">Watt + Velocità</option>
                        <option value="watt">Solo Watt</option>
                        <option value="speed">Solo Velocità</option>
                    </select>
                </div>
                <div>
                    <label>Target Watt (W)</label><br>
                    <input type="number" id="targetWatt" placeholder="es. 250" oninput="updatePreview()">
                </div>
                <div>
                    <label>Target Velocità (km/h)</label><br>
                    <input type="number" id="targetSpeed" placeholder="es. 32.5" oninput="updatePreview()">
                </div>
                <button id="exportBtn" onclick="exportGPX()">Esporta _modified.gpx</button>
            </div>
            <p id="previewText" style="margin-top: 15px; font-size: 0.9rem; color: #666;"></p>
        </div>
    </div>

    <script>
        let gpxData = { xml: null, points: [], name: "" };
        let chart = null;

        function toggleTheme() {
            const body = document.documentElement;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeToggle').textContent = isDark ? '🌙 Mode' : '☀️ Mode';
        }

        function handleDrop(e) {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        }

        async function handleFile(file) {
            if (!file || !file.name.endsWith('.gpx')) return;
            gpxData.name = file.name.replace('.gpx', '');
            const text = await file.text();
            const parser = new DOMParser();
            gpxData.xml = parser.parseFromString(text, "text/xml");
            parseGPX();
        }

        function parseGPX() {
            const trks = gpxData.xml.querySelectorAll('trkpt');
            const points = [];
            let totalPower = 0;
            let powerCount = 0;
            let totalElev = 0;
            let lastElev = null;

            trks.forEach(pt => {
                const lat = parseFloat(pt.getAttribute('lat'));
                const lon = parseFloat(pt.getAttribute('lon'));
                const ele = parseFloat(pt.querySelector('ele')?.textContent || 0);
                const time = new Date(pt.querySelector('time')?.textContent);
                const pwr = pt.querySelector('power, PowerInWatts')?.textContent;
                
                const point = { lat, lon, ele, time, pwr: pwr ? parseInt(pwr) : null };
                points.push(point);

                if (point.pwr !== null) { totalPower += point.pwr; powerCount++; }
                if (lastElev !== null && ele > lastElev) totalElev += (ele - lastElev);
                lastElev = ele;
            });

            gpxData.points = points;
            updateDashboard(totalPower, powerCount, totalElev);
            renderChart();
            
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('visuals').classList.remove('hidden');
            document.getElementById('editor').classList.remove('hidden');
        }

        function updateDashboard(totalPower, powerCount, totalElev) {
            const points = gpxData.points;
            if (points.length < 2) return;

            const dist = calculateDistance(points);
            const durationMs = points[points.length-1].time - points[0].time;
            const avgSpd = (dist / (durationMs / 3600000)).toFixed(1);

            document.getElementById('avgPower').textContent = powerCount > 0 ? Math.round(totalPower / powerCount) : 'N/A';
            document.getElementById('avgSpeed').textContent = avgSpd;
            document.getElementById('distance').textContent = dist.toFixed(2);
            document.getElementById('duration').textContent = formatMs(durationMs);
            document.getElementById('points').textContent = points.length;
            document.getElementById('elevation').textContent = Math.round(totalElev);
            
            document.getElementById('targetWatt').value = powerCount > 0 ? Math.round(totalPower / powerCount) : '';
            document.getElementById('targetSpeed').value = avgSpd;
            updatePreview();
        }

        function calculateDistance(pts) {
            let d = 0;
            for(let i=1; i<pts.length; i++) {
                const R = 6371;
                const dLat = (pts[i].lat - pts[i-1].lat) * Math.PI / 180;
                const dLon = (pts[i].lon - pts[i-1].lon) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                        Math.cos(pts[i-1].lat * Math.PI / 180) * Math.cos(pts[i].lat * Math.PI / 180) * 
                        Math.sin(dLon/2) * Math.sin(dLon/2);
                d += 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * R;
            }
            return d;
        }

        function formatMs(ms) {
            const s = Math.floor(ms / 1000);
            return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
        }

        function renderChart() {
            const ctx = document.getElementById('profileChart').getContext('2d');
            if (chart) chart.destroy();
            
            const step = Math.max(1, Math.floor(gpxData.points.length / 500));
            const sampled = gpxData.points.filter((_, i) => i % step === 0);

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sampled.map((_, i) => i),
                    datasets: [
                        { label: 'Quota (m)', data: sampled.map(p => p.ele), borderColor: '#2563eb', yAxisID: 'y' },
                        { label: 'Potenza (W)', data: sampled.map(p => p.pwr), borderColor: '#ef4444', yAxisID: 'y1' }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { type: 'linear', position: 'left' }, y1: { type: 'linear', position: 'right', grid: { display: false } } }
                }
            });
        }

        function updatePreview() {
            const mode = document.getElementById('editMode').value;
            const currPwr = parseInt(document.getElementById('avgPower').textContent) || 0;
            const currSpd = parseFloat(document.getElementById('avgSpeed').textContent) || 0;
            const targetPwr = parseInt(document.getElementById('targetWatt').value) || currPwr;
            const targetSpd = parseFloat(document.getElementById('targetSpeed').value) || currSpd;

            let text = "";
            if (mode !== 'speed' && currPwr > 0) {
                const pDiff = (((targetPwr / currPwr) - 1) * 100).toFixed(1);
                text += `Watt: ${pDiff}% | `;
            }
            if (mode !== 'watt') {
                const sDiff = (((targetSpd / currSpd) - 1) * 100).toFixed(1);
                text += `Tempo: ${(-sDiff).toFixed(1)}% (Velocità)`;
            }
            document.getElementById('previewText').textContent = text;
        }

        function exportGPX() {
            const mode = document.getElementById('editMode').value;
            const currPwr = parseInt(document.getElementById('avgPower').textContent) || 1;
            const currSpd = parseFloat(document.getElementById('avgSpeed').textContent) || 1;
            const targetPwr = parseInt(document.getElementById('targetWatt').value) || currPwr;
            const targetSpd = parseFloat(document.getElementById('targetSpeed').value) || currSpd;

            const pFactor = targetPwr / currPwr;
            const tFactor = currSpd / targetSpd;

            const newXml = gpxData.xml.cloneNode(true);
            const trks = newXml.querySelectorAll('trkpt');
            
            let startTime = new Date(trks[0].querySelector('time').textContent).getTime();
            let lastOrigTime = startTime;
            let currentNewTime = startTime;

            trks.forEach((pt, i) => {
                // Power
                if (mode !== 'speed') {
                    const pNode = pt.querySelector('power, PowerInWatts');
                    if (pNode) pNode.textContent = Math.round(parseInt(pNode.textContent) * pFactor);
                }

                // Time
                if (mode !== 'watt' && i > 0) {
                    const timeNode = pt.querySelector('time');
                    const origTime = new Date(timeNode.textContent).getTime();
                    const diff = origTime - lastOrigTime;
                    currentNewTime += (diff * tFactor);
                    timeNode.textContent = new Date(currentNewTime).toISOString();
                    lastOrigTime = origTime;
                }
            });

            const blob = new Blob([new XMLSerializer().serializeToString(newXml)], {type: 'text/xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${gpxData.name}_modified.gpx`;
            a.click();
        }
    </script>
</body>
</html>
