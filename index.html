<!DOCTYPE html>
<html lang=\"it\" data-theme=\"dark\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>CycleEdit Pro - Power & Speed Editor</title>
    <link rel=\"icon\" href=\"logo.svg\" type=\"image/svg+xml\">

    <!-- Librerie Esterne -->
    <script src=\"https://cdn.jsdelivr.net/npm/chart.js\"></script>
    <!-- Fit Parser (Browser compatible version) -->
    <script src=\"https://cdn.jsdelivr.net/npm/fit-file-parser@1.8.7/dist/fit-parser.js\"></script>
    <!-- Fit Writer -->
    <script src=\"https://cdn.jsdelivr.net/npm/@markw65/fit-file-writer@0.1.7/dist/fit-file-writer.min.js\"></script>

    <link rel=\"stylesheet\" href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap\">

    <!-- Stili Locali -->
    <link rel=\"stylesheet\" href=\"style.css\">
</head>
<body>

<nav class=\"navbar\">
    <div class=\"navbar-brand\">
        <img src=\"logo.svg\" alt=\"GPX Editor\" height=\"36\" style=\"vertical-align:middle;\">
    </div>
    <div class=\"navbar-actions\">
        <button class=\"btn-icon\" id=\"themeToggle\" onclick=\"toggleTheme()\">☀️ Light</button>
    </div>
</nav>

<main class=\"main\">
    <!-- Sezione Caricamento -->
    <section class=\"upload-section\">
        <h2 class=\"upload-title\">Modifica le tue Attività</h2>
        <p class=\"upload-sub\">Trascina uno o più file per iniziare la modifica bulk o singola.</p>
        
        <div class=\"drop-zone\" id=\"dropZone\">
            <div class=\"drop-zone-content\">
                <div class=\"upload-icon\">📂</div>
                <p>Trascina file <strong>.GPX</strong> o <strong>.FIT</strong> qui</p>
                <span>oppure clicca per sfogliare</span>
            </div>
            <input type=\"file\" id=\"fileInput\" multiple accept=\".gpx,.fit\" style=\"display:none;\">
        </div>
    </section>

    <!-- Interfaccia Editor (Nascosta inizialmente) -->
    <section id=\"editorInterface\" class=\"editor-container hidden\">
        <div class=\"editor-sidebar\">
            <div class=\"card\">
                <h3>File Caricati</h3>
                <div id=\"fileList\" class=\"file-list\"></div>
            </div>
        </div>

        <div class=\"editor-main\">
            <!-- Dashboard KPI -->
            <div class=\"kpi-grid\">
                <div class=\"kpi-card\">
                    <label>Potenza Media</label>
                    <div class=\"value\"><span id=\"avgPower\">-</span><small>W</small></div>
                </div>
                <div class=\"kpi-card\">
                    <label>Velocità Media</label>
                    <div class=\"value\"><span id=\"avgSpeed\">-</span><small>km/h</small></div>
                </div>
                <div class=\"kpi-card\">
                    <label>Distanza</label>
                    <div class=\"value\"><span id=\"distance\">-</span><small>km</small></div>
                </div>
                <div class=\"kpi-card\">
                    <label>Durata</label>
                    <div class=\"value\"><span id=\"duration\">-</span></div>
                </div>
                <div class=\"kpi-card\">
                    <label>Punti</label>
                    <div class=\"value\" id=\"points\">-</div>
                </div>
                <div class=\"kpi-card\">
                    <label>Dislivello +</label>
                    <div class=\"value\"><span id=\"elevation\">-</span><small>m</small></div>
                </div>
            </div>

            <!-- Grafico -->
            <div class=\"card chart-container\">
                <canvas id=\"mainChart\"></canvas>
            </div>

            <!-- Pannello Azioni -->
            <div class=\"card action-panel\">
                <div class=\"action-grid\">
                    <div class=\"input-group\">
                        <label>Modalità Editing</label>
                        <select id=\"editMode\">
                            <option value=\"both\">Potenza & Velocità</option>
                            <option value=\"watt\">Solo Potenza</option>
                            <option value=\"speed\">Solo Velocità</option>
                        </select>
                    </div>
                    <div class=\"input-group\">
                        <label>Target Watt (Media)</label>
                        <input type=\"number\" id=\"targetWatt\" placeholder=\"Es: 250\">
                    </div>
                    <div class=\"input-group\">
                        <label>Target Speed (Media)</label>
                        <input type=\"number\" id=\"targetSpeed\" step=\"0.1\" placeholder=\"Es: 32.5\">
                    </div>
                </div>
                
                <div class=\"preview-info\" id=\"previewText\">Nessuna modifica</div>
                
                <div class=\"export-actions\">
                    <button class=\"btn-primary\" onclick=\"exportFile()\">Esporta Attività Modificata</button>
                </div>
            </div>
        </div>
    </section>
</main>

<div id=\"toast\" class=\"toast\">File esportato con successo!</div>

<script src=\"app.js\"></script>
</body>
</html>
